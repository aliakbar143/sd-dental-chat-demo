<!DOCTYPE html>
<html>
<head>
  <title>SD Dental Clinic AI Assistant Demo</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 30px;
      background: #f7f7f7;
    }
    .chatbox {
      width: 350px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: left;
    }
    .bot {
      background: #e6f3ff;
      padding: 10px;
      border-radius: 8px;
      margin: 10px 0;
    }
    .user {
      background: #dcf8c6;
      padding: 10px;
      border-radius: 8px;
      margin: 10px 0;
      text-align: right;
    }
  </style>
</head>
<body>
  <h2>SD Dental Clinic AI Assistant</h2>
  <div class="chatbox">
    <div class="bot">Hi 👋 Welcome to SD Dental Clinic. How can I help you today?</div>
    <div class="user">I want to book an appointment</div>
    <div class="bot">Sure! What treatment would you like to book for?</div>
    <div class="user">Teeth whitening</div>
    <div class="bot">Great — we have availability tomorrow at 2 PM. Would you like me to reserve that for you?</div>
  </div>
</body>
</html>
